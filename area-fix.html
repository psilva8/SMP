<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; img-src * data: blob:; connect-src *;">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Find top-rated Hair Tattoo clinics in your area. Compare services, reviews, and pricing.">
    <meta name="keywords" content="Hair Tattoo, Hair Loss, Hairline Restoration, Hair Tattoo Clinic">
    <title>Area Redirect</title>
    <meta name="author" content="Hair Tattoo Directory">
    <link rel="stylesheet" href="styles.css">
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Get the area from the URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const area = urlParams.get('area');
            
            if (area) {
                // Redirect to the area page
                window.location.href = `areas/${area}/index.html`;
            } else {
                // Show area selection
                document.getElementById('area-select').style.display = 'block';
            }
            
            // Populate list of available areas
            const popularAreas = [
                'beverly-hills', 'los-angeles', 'santa-monica', 'glendale',
                'burbank', 'pasadena', 'long-beach', 'compton', 'downey'
            ];
            
            const areaList = document.getElementById('area-list');
            popularAreas.forEach(area => {
                const li = document.createElement('li');
                const link = document.createElement('a');
                link.href = `areas/${area}/index.html`;
                link.textContent = area.replace(/-/g, ' ');
                link.style.textTransform = 'capitalize';
                li.appendChild(link);
                areaList.appendChild(li);
            });
        });
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        h1 {
            color: #4338ca;
        }
        ul {
            padding-left: 20px;
        }
        li {
            margin-bottom: 10px;
        }
        a {
            color: #4338ca;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Area Pages Navigation</h1>
    
    <div id="area-select" style="display: none;">
        <p>Select an area to view Hair Tattoo clinics:</p>
        <ul id="area-list"></ul>
        
        <p><a href="index.html">Back to Home</a> | <a href="areas.html">All Areas</a></p>
    </div>
    
    <div id="redirect-message">
        <p>Redirecting to the selected area...</p>
    </div>
    <!-- Script to remove Hair Tattoo Treatment from clinic cards -->
    <script src="/remove-smp-dom.js"></script>



<script src="final-dropdown-fix.js"></script>
</body>
</html>
