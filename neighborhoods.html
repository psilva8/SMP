<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMP Clinics by Area | SMP Hair Tattoo Directory</title>
    <meta name="description" content="Find top-rated SMP (Scalp Micropigmentation) clinics in your neighborhood. Browse SMP providers by area throughout Los Angeles and surrounding regions.">
    <meta http-equiv="refresh" content="0;url=areas.html">
    
    <!-- Tailwind CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <style>
        .neighborhood-item.active {
            border-color: #2563eb;
            border-width: 2px;
        }
        
        .dropdown {
            position: relative;
            display: inline-block;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #f9f9f9;
            min-width: 200px;
            max-height: 400px;
            overflow-y: auto;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 50;
            border-radius: 5px;
            margin-top: 5px;
            scrollbar-width: thin;
            scrollbar-color: #4F46E5 #f1f1f1;
        }
        .dropdown-content::-webkit-scrollbar {
            width: 8px;
        }
        .dropdown-content::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        .dropdown-content::-webkit-scrollbar-thumb {
            background-color: #4F46E5;
            border-radius: 4px;
        }
        .dropdown-content a {
            color: #333;
            padding: 8px 12px;
            text-decoration: none;
            display: block;
            transition: background-color 0.2s;
        }
        .dropdown-content a:hover {
            background-color: #f1f1f1;
            color: #4F46E5;
        }
        .dropdown.active .dropdown-content {
            display: block;
        }
        header {
            position: relative;
            z-index: 40;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <!-- Header -->
    <header class="bg-gradient-to-r from-blue-800 to-indigo-800 text-white shadow-md">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <a href="index.html" class="text-2xl font-bold">SMP Hair Tattoo Directory</a>
                <nav class="hidden md:flex space-x-6">
                    <a href="index.html" class="hover:text-blue-200 transition">Home</a>
                    
                    <!-- Areas Dropdown -->
                    <div class="dropdown">
                        <a href="areas.html" class="font-semibold border-b-2 border-white">Areas ▾</a>
                        <div id="areas-dropdown" class="dropdown-content">
                            <!-- Areas will be populated by JavaScript -->
                            <div class="text-center py-2 text-gray-500 text-sm">Loading areas...</div>
                        </div>
                    </div>
                    
                    <a href="about.html" class="hover:text-blue-200 transition">About SMP</a>
                </nav>
                
                <!-- Mobile menu button -->
                <button class="md:hidden text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
                    </svg>
                </button>
            </div>
            
            <!-- Mobile menu (hidden by default) -->
            <div class="md:hidden hidden pt-4 pb-2">
                <a href="index.html" class="block py-2 hover:text-blue-200 transition">Home</a>
                <a href="areas.html" class="block py-2 font-semibold">Areas</a>
                <a href="about.html" class="block py-2 hover:text-blue-200 transition">About SMP</a>
            </div>
        </div>
    </header>

    <!-- Main content -->
    <main class="container mx-auto px-4 py-8">
        <section class="mb-10 text-center">
            <h1 class="text-3xl md:text-4xl font-bold mb-4 text-gray-800">Redirecting to Areas Page...</h1>
            <p class="text-gray-600 max-w-3xl mx-auto">
                If you are not redirected automatically, please <a href="areas.html" class="text-blue-600 hover:underline">click here</a>.
            </p>
        </section>
    </main>

    <!-- JavaScript -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Check if there's a specific neighborhood in the URL
            const urlParams = new URLSearchParams(window.location.search);
            const area = urlParams.get('area');
            
            if (area) {
                // Convert to URL-friendly format
                const urlFriendlyArea = area.toLowerCase().replace(/\s+/g, '-');
                // Redirect to the new URL structure
                window.location.href = `areas/${encodeURIComponent(urlFriendlyArea)}/`;
                return;
            }
            
            // For old URLs like /neighborhoods/beverly-hills.html
            const path = window.location.pathname;
            const pathParts = path.split('/').filter(part => part);
            
            if (pathParts.length >= 2 && pathParts[0] === 'neighborhoods' && pathParts[1] && pathParts[1] !== 'neighborhoods.html') {
                // Extract the neighborhood name from the path
                const neighborhoodFile = pathParts[1];
                // Remove the .html extension if present
                const neighborhoodName = neighborhoodFile.replace('.html', '');
                // Redirect to the new URL structure
                window.location.href = `/areas/${neighborhoodName}/`;
                return;
            }
            
            // Default redirect to areas.html
            window.location.href = '/areas.html';
        });
    </script>
</body>
</html>
