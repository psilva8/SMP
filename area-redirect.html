<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; img-src * data: blob:; connect-src *;">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Find top-rated Hair Tattoo clinics in your area. Compare services, reviews, and pricing.">
    <meta name="keywords" content="Hair Tattoo, Hair Loss, Hairline Restoration, Hair Tattoo Clinic">
    <title>Redirecting...</title>
    <meta name="author" content="Hair Tattoo Directory">
    <link rel="stylesheet" href="styles.css">
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Extract the area name from the URL path
            let areaName = '';
            
            if (window.location.pathname.includes('/area/')) {
                // Extract the area name from the path
                const pathParts = window.location.pathname.split('/');
                console.log('Path parts:', pathParts);
                
                const areaIndex = pathParts.indexOf('area') + 1;
                console.log('Area index:', areaIndex);
                
                if (areaIndex > 0 && areaIndex < pathParts.length) {
                    areaName = pathParts[areaIndex];
                    console.log('Extracted area name:', areaName);
                    
                    // Redirect to the areas URL
                    window.location.href = '/areas/' + areaName + '/';
                } else {
                    // If no area name is found, redirect to home
                    window.location.href = '/';
                }
            } else {
                // If not on an area page, redirect to home
                window.location.href = '/';
            }
        });
    </script>
</head>
<body>
    <h1>Redirecting to the correct page...</h1>
    <p>If you are not redirected automatically, please click <a id="redirect-link" href="/">here</a>.</p>
    
    <script>
        // Update the redirect link
        document.addEventListener('DOMContentLoaded', function() {
            const redirectLink = document.getElementById('redirect-link');
            if (redirectLink && window.location.pathname.includes('/area/')) {
                const pathParts = window.location.pathname.split('/');
                const areaIndex = pathParts.indexOf('area') + 1;
                
                if (areaIndex > 0 && areaIndex < pathParts.length) {
                    const areaName = pathParts[areaIndex];
                    redirectLink.href = '/areas/' + areaName + '/';
                }
            }
        });
    </script>

</body>
</html>
