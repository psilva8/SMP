<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Clinic Data Loading</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; }
        h1, h2 { color: #333; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 5px; overflow: auto; }
        button { padding: 8px 16px; background: #4F46E5; color: white; border: none; border-radius: 4px; 
                cursor: pointer; margin-right: 10px; margin-bottom: 10px; }
        button:hover { background: #4338CA; }
        #area-filter { padding: 8px; margin-right: 10px; width: 200px; }
        .clinic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .clinic-card { border: 1px solid #ddd; border-radius: 5px; padding: 15px; background: white; }
        .loading { color: #666; font-style: italic; }
    </style>
</head>
<body>
    <h1>SMP Clinic Data Test</h1>
    
    <div>
        <h2>Data Loading Status</h2>
        <p id="status" class="loading">Loading data...</p>
        <button id="load-data">Load Business Data</button>
        <button id="check-filtered">Check Filtered Data</button>
    </div>
    
    <div>
        <h2>Filter by Area</h2>
        <input type="text" id="area-filter" placeholder="Enter area name">
        <button id="apply-filter">Filter</button>
        <button id="show-all">Show All</button>
    </div>
    
    <div>
        <h2>Results (<span id="count">0</span>)</h2>
        <div id="clinics" class="clinic-grid"></div>
    </div>
    
    <div>
        <h2>Debug Log</h2>
        <pre id="log"></pre>
    </div>
    
    <script>
        // Debug log function
        function log(message) {
            const logElement = document.getElementById('log');
            logElement.textContent += message + '\n';
            console.log(message);
        }
        
        // Function to display clinics
        function displayClinics(clinics) {
            const container = document.getElementById('clinics');
            const countElement = document.getElementById('count');
            
            container.innerHTML = '';
            countElement.textContent = clinics.length;
            
            if (clinics.length === 0) {
                container.innerHTML = '<p>No clinics found matching your criteria.</p>';
                return;
            }
            
            clinics.forEach(clinic => {
                const card = document.createElement('div');
                card.className = 'clinic-card';
                
                card.innerHTML = `
                    <h3>${clinic.name}</h3>
                    <p><strong>City:</strong> ${clinic.city || 'N/A'}</p>
                    <p><strong>Neighborhood:</strong> ${clinic.neighborhood || 'N/A'}</p>
                    <p><strong>Address:</strong> ${clinic.address || 'N/A'}</p>
                    <p><strong>Rating:</strong> ${clinic.rating || 'N/A'}</p>
                `;
                
                container.appendChild(card);
            });
        }
        
        // Load the business data
        document.getElementById('load-data').addEventListener('click', function() {
            const statusElement = document.getElementById('status');
            statusElement.textContent = 'Loading data from JSON file...';
            
            // Use the same JSON file path as in the main script
            fetch('/Outscraper-20250423020658xs04_micropigmentation_+1.json')
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    log(`Loaded ${data.length} businesses from JSON`);
                    
                    // Basic processing - filter out closed businesses
                    const filtered = data.filter(b => !b.permanently_closed);
                    log(`After filtering closed businesses: ${filtered.length} businesses`);
                    
                    // Set the global variables to match the main script
                    window.allBusinesses = filtered;
                    window.filteredBusinesses = filtered;
                    
                    statusElement.textContent = `Data loaded: ${filtered.length} businesses available`;
                    
                    // Display first 20 businesses
                    displayClinics(filtered.slice(0, 20));
                    
                    // Log some sample data
                    if (filtered.length > 0) {
                        log('Sample business data:');
                        log(JSON.stringify(filtered[0], null, 2));
                    }
                })
                .catch(error => {
                    log(`Error loading data: ${error.message}`);
                    statusElement.textContent = `Error loading data: ${error.message}`;
                    
                    // Try fallback path
                    log('Trying fallback path...');
                    fetch('Outscraper-20250423020658xs04_micropigmentation_+1.json')
                        .then(response => response.json())
                        .then(data => {
                            log(`Loaded ${data.length} businesses from fallback path`);
                            window.allBusinesses = data;
                            window.filteredBusinesses = data;
                            statusElement.textContent = `Data loaded (fallback): ${data.length} businesses`;
                            displayClinics(data.slice(0, 20));
                        })
                        .catch(fallbackError => {
                            log(`Fallback also failed: ${fallbackError.message}`);
                            statusElement.textContent = 'All data loading attempts failed';
                        });
                });
        });
        
        // Check filtered data
        document.getElementById('check-filtered').addEventListener('click', function() {
            if (!window.filteredBusinesses) {
                log('filteredBusinesses is not yet defined');
                return;
            }
            
            log(`filteredBusinesses contains ${window.filteredBusinesses.length} businesses`);
            
            // Count businesses by city
            const cityCounts = {};
            window.filteredBusinesses.forEach(business => {
                const city = business.city || 'Unknown';
                cityCounts[city] = (cityCounts[city] || 0) + 1;
            });
            
            // Log the city counts
            log('Businesses by city:');
            Object.entries(cityCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10)
                .forEach(([city, count]) => {
                    log(`${city}: ${count} businesses`);
                });
        });
        
        // Filter by area
        document.getElementById('apply-filter').addEventListener('click', function() {
            const areaName = document.getElementById('area-filter').value.trim();
            if (!areaName) {
                log('Please enter an area name to filter');
                return;
            }
            
            if (!window.filteredBusinesses) {
                log('No data loaded yet. Please load data first.');
                return;
            }
            
            const areaNameLower = areaName.toLowerCase();
            const filtered = window.filteredBusinesses.filter(business => {
                if ((business.city && business.city.toLowerCase() === areaNameLower) || 
                    (business.neighborhood && business.neighborhood.toLowerCase() === areaNameLower)) {
                    return true;
                }
                
                if (business.address && business.address.toLowerCase().includes(areaNameLower)) {
                    return true;
                }
                
                return false;
            });
            
            log(`Found ${filtered.length} businesses in "${areaName}"`);
            displayClinics(filtered);
        });
        
        // Show all
        document.getElementById('show-all').addEventListener('click', function() {
            if (!window.filteredBusinesses) {
                log('No data loaded yet. Please load data first.');
                return;
            }
            
            displayClinics(window.filteredBusinesses.slice(0, 50));
            log('Showing first 50 businesses');
        });
    </script>
</body>
</html>
