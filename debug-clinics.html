<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug SMP Clinics</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #333;
        }
        pre {
            background-color: #f5f5f5;
            padding: 10px;
            border-radius: 5px;
            overflow: auto;
        }
        .logs {
            margin-top: 20px;
        }
        #results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .clinic-card {
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
            background-color: #fff;
        }
    </style>
</head>
<body>
    <h1>Debug SMP Clinics</h1>
    
    <div>
        <h2>Beverly Hills Clinics</h2>
        <button id="testFilterButton">Test Filter for Beverly Hills</button>
        <div id="results"></div>
        <div class="logs">
            <h3>Console Logs</h3>
            <pre id="logs"></pre>
        </div>
    </div>

    <script src="/scripts.js"></script>
    <script>
        // Override console.log to capture logs
        const originalConsoleLog = console.log;
        console.log = function() {
            document.getElementById('logs').textContent += Array.from(arguments).join(' ') + '\n';
            originalConsoleLog.apply(console, arguments);
        };

        document.addEventListener('DOMContentLoaded', function() {
            console.log('Debug page loaded, waiting for business data...');
            
            // Load the business data
            fetchBusinessData();

            // Set up test button
            document.getElementById('testFilterButton').addEventListener('click', function() {
                console.log('Testing filter for Beverly Hills...');
                testAreaFilter('Beverly Hills');
            });
        });

        function testAreaFilter(areaName) {
            if (!window.allBusinesses || window.allBusinesses.length === 0) {
                console.log('No business data loaded yet. Try again in a moment.');
                return;
            }

            const areaNameLower = areaName.toLowerCase();
            const clinics = window.filteredBusinesses.filter(business => {
                // Direct match with city or neighborhood
                if ((business.city && business.city.toLowerCase() === areaNameLower) || 
                    (business.neighborhood && business.neighborhood.toLowerCase() === areaNameLower)) {
                    return true;
                }
                
                // Check if the address contains the area name
                if (business.address && business.address.toLowerCase().includes(areaNameLower)) {
                    return true;
                }
                
                return false;
            });

            console.log(`Found ${clinics.length} clinics in ${areaName}`);
            
            // Display the clinics
            const resultsContainer = document.getElementById('results');
            resultsContainer.innerHTML = '';
            
            if (clinics.length === 0) {
                resultsContainer.innerHTML = '<p>No clinics found</p>';
                return;
            }
            
            clinics.forEach(clinic => {
                const clinicCard = document.createElement('div');
                clinicCard.className = 'clinic-card';
                clinicCard.innerHTML = `
                    <h3>${clinic.name}</h3>
                    <p><strong>City:</strong> ${clinic.city || 'N/A'}</p>
                    <p><strong>Neighborhood:</strong> ${clinic.neighborhood || 'N/A'}</p>
                    <p><strong>Address:</strong> ${clinic.address || 'N/A'}</p>
                    <p><strong>Rating:</strong> ${clinic.rating || 'N/A'}</p>
                `;
                resultsContainer.appendChild(clinicCard);
            });
        }
    </script>
</body>
</html>
