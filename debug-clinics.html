<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Clinic Loading</title>
</head>
<body>
    <h1>Debug Clinic Loading</h1>
    
    <div>
        <h2>Clinic Data Status</h2>
        <div id="status"></div>
    </div>
    
    <div>
        <h2>Test Area: Beverly Hills</h2>
        <div id="test-clinics"></div>
    </div>
    
    <script src="scripts.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const statusDiv = document.getElementById('status');
            const testClinicsDiv = document.getElementById('test-clinics');
            
            // Check if business data is loaded
            statusDiv.innerHTML = `
                <p>allBusinesses: ${window.allBusinesses ? window.allBusinesses.length : 'not loaded'}</p>
                <p>filteredBusinesses: ${window.filteredBusinesses ? window.filteredBusinesses.length : 'not loaded'}</p>
            `;
            
            // Manually fetch business data if not loaded
            if (!window.filteredBusinesses || window.filteredBusinesses.length === 0) {
                statusDiv.innerHTML += '<p>Fetching business data...</p>';
                
                fetchBusinessData().then(data => {
                    statusDiv.innerHTML += `<p>Fetched ${data.length} businesses</p>`;
                    testFilterForBeverlyHills();
                }).catch(error => {
                    statusDiv.innerHTML += `<p>Error fetching data: ${error.message}</p>`;
                });
            } else {
                testFilterForBeverlyHills();
            }
            
            function testFilterForBeverlyHills() {
                const areaName = 'Beverly Hills';
                const areaNameLower = areaName.toLowerCase();
                
                // Log the first 10 businesses to see their structure
                statusDiv.innerHTML += '<p>First 10 businesses:</p><ul>';
                for (let i = 0; i < Math.min(10, window.filteredBusinesses.length); i++) {
                    const b = window.filteredBusinesses[i];
                    statusDiv.innerHTML += `<li>${b.name} - City: "${b.city || 'N/A'}", Neighborhood: "${b.neighborhood || 'N/A'}"</li>`;
                }
                statusDiv.innerHTML += '</ul>';
                
                // Try to filter for Beverly Hills
                const bevHillsClinics = window.filteredBusinesses.filter(business => {
                    if ((business.city && business.city.toLowerCase() === areaNameLower) || 
                        (business.neighborhood && business.neighborhood.toLowerCase() === areaNameLower)) {
                        return true;
                    }
                    
                    if (business.address && business.address.toLowerCase().includes(areaNameLower)) {
                        return true;
                    }
                    
                    return false;
                });
                
                testClinicsDiv.innerHTML = `<p>Found ${bevHillsClinics.length} clinics in Beverly Hills</p>`;
                
                if (bevHillsClinics.length > 0) {
                    testClinicsDiv.innerHTML += '<ul>';
                    bevHillsClinics.forEach(clinic => {
                        testClinicsDiv.innerHTML += `
                            <li>
                                <strong>${clinic.name}</strong><br>
                                City: ${clinic.city || 'N/A'}<br>
                                Neighborhood: ${clinic.neighborhood || 'N/A'}<br>
                                Address: ${clinic.address || clinic.full_address || 'N/A'}
                            </li>
                        `;
                    });
                    testClinicsDiv.innerHTML += '</ul>';
                }
            }
        });
    </script>
</body>
</html>
